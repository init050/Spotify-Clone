version: '3.8'

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:14
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${spotify_clone}
      - POSTGRES_USER=${spotify_clone}
      - POSTGRES_PASSWORD=${ZhWVEmq3}

  redis:
    image: redis:6-alpine

volumes:
  postgres_data:
